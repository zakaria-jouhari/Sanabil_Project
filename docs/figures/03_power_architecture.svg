<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 650" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e65100"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1050" height="650" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="525" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">Power Distribution Architecture</text>
  <text x="525" y="55" text-anchor="middle" font-size="12" fill="#636e72">36V Li-ion | Isolated Motor + Logic Rails | Fused Protection</text>

  <!-- ==================== BATTERY ==================== -->
  <rect x="50" y="85" width="220" height="80" rx="8" fill="#ffffff" stroke="#d32f2f" stroke-width="3" filter="url(#shadow)"/>
  <!-- Battery icon -->
  <rect x="70" y="105" width="50" height="28" rx="3" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2"/>
  <rect x="120" y="113" width="8" height="12" rx="2" fill="#d32f2f"/>
  <text x="95" y="123" text-anchor="middle" font-size="11" font-weight="700" fill="#b71c1c">+  -</text>
  <text x="195" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#b71c1c">36V Battery</text>
  <text x="195" y="128" text-anchor="middle" font-size="10" fill="#d32f2f">10S Li-ion | 42V max</text>
  <text x="195" y="145" text-anchor="middle" font-size="10" fill="#d32f2f">Hoverboard pack + BMS</text>
  <text x="195" y="158" text-anchor="middle" font-size="9" fill="#9e9e9e">30-42V operating range</text>

  <!-- Main Fuse -->
  <rect x="320" y="98" width="100" height="50" rx="5" fill="#fff3e0" stroke="#ef6c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">30A</text>
  <text x="370" y="135" text-anchor="middle" font-size="10" fill="#ef6c00">Main Fuse</text>
  <!-- Fuse icon -->
  <line x1="345" y1="143" x2="395" y2="143" stroke="#ef6c00" stroke-width="2"/>
  <ellipse cx="370" cy="143" rx="12" ry="4" fill="none" stroke="#ef6c00" stroke-width="1.5"/>

  <!-- Master Switch -->
  <rect x="470" y="98" width="120" height="50" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">Master SW</text>
  <text x="530" y="135" text-anchor="middle" font-size="10" fill="#43a047">Power On/Off</text>
  <!-- Switch symbol -->
  <circle cx="500" cy="143" r="3" fill="#43a047"/>
  <line x1="503" y1="141" x2="520" y2="135" stroke="#43a047" stroke-width="2"/>
  <circle cx="525" cy="143" r="3" fill="none" stroke="#43a047" stroke-width="1.5"/>

  <!-- Battery to Fuse line -->
  <line x1="270" y1="123" x2="320" y2="123" stroke="#d32f2f" stroke-width="3" marker-end="url(#arrR)"/>

  <!-- Fuse to Switch line -->
  <line x1="420" y1="123" x2="470" y2="123" stroke="#d32f2f" stroke-width="3" marker-end="url(#arrR)"/>

  <!-- ==================== DISTRIBUTION BUS ==================== -->
  <!-- Main bus line -->
  <line x1="590" y1="123" x2="680" y2="123" stroke="#d32f2f" stroke-width="3"/>
  <rect x="670" y="105" width="20" height="36" rx="3" fill="#d32f2f"/>
  <text x="680" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#b71c1c">BUS</text>

  <!-- Bus vertical line -->
  <line x1="680" y1="123" x2="680" y2="520" stroke="#d32f2f" stroke-width="3"/>

  <!-- ==================== MOTOR POWER BRANCH (through E-STOP) ==================== -->

  <!-- E-STOP -->
  <rect x="740" y="85" width="140" height="76" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="810" y="108" text-anchor="middle" font-size="15" font-weight="800" fill="#b71c1c">E-STOP</text>
  <text x="810" y="125" text-anchor="middle" font-size="10" fill="#c62828">NC Relay / Contactor</text>
  <text x="810" y="140" text-anchor="middle" font-size="9" fill="#e53935">Cuts motor power ONLY</text>
  <text x="810" y="153" text-anchor="middle" font-size="8" fill="#ef9a9a">Logic stays alive</text>

  <!-- Bus to E-STOP -->
  <line x1="690" y1="110" x2="740" y2="110" stroke="#d32f2f" stroke-width="2.5" marker-end="url(#arrR)"/>

  <!-- E-STOP to motor fuses -->
  <line x1="880" y1="123" x2="950" y2="123" stroke="#d32f2f" stroke-width="2.5"/>
  <line x1="950" y1="123" x2="950" y2="310" stroke="#d32f2f" stroke-width="2.5"/>

  <!-- Left motor branch -->
  <line x1="950" y1="190" x2="870" y2="190" stroke="#d32f2f" stroke-width="2"/>

  <!-- Left Motor Fuse -->
  <rect x="780" y="175" width="90" height="36" rx="4" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="825" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">20A Fuse</text>

  <!-- Left ZS-X11H -->
  <rect x="780" y="225" width="185" height="65" rx="5" fill="#ffffff" stroke="#ef6c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="872" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#bf360c">ZS-X11H LEFT</text>
  <text x="872" y="264" text-anchor="middle" font-size="10" fill="#ef6c00">BLDC Controller | 400W</text>
  <text x="872" y="278" text-anchor="middle" font-size="9" fill="#9e9e9e">16A rated | 20A peak</text>

  <!-- Left Motor -->
  <rect x="810" y="308" width="145" height="48" rx="22" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="882" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#4a148c">Left BLDC</text>
  <text x="882" y="346" text-anchor="middle" font-size="9" fill="#8e24aa">3-ph + Hall</text>

  <!-- Fuse to controller -->
  <line x1="825" y1="211" x2="825" y2="225" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrR)"/>
  <!-- Controller to motor -->
  <line x1="872" y1="290" x2="882" y2="308" stroke="#8e24aa" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- Right motor branch -->
  <line x1="950" y1="400" x2="870" y2="400" stroke="#d32f2f" stroke-width="2"/>

  <!-- Right Motor Fuse -->
  <rect x="780" y="385" width="90" height="36" rx="4" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="825" y="406" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">20A Fuse</text>

  <!-- Right ZS-X11H -->
  <rect x="780" y="432" width="185" height="65" rx="5" fill="#ffffff" stroke="#ef6c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="872" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#bf360c">ZS-X11H RIGHT</text>
  <text x="872" y="471" text-anchor="middle" font-size="10" fill="#ef6c00">BLDC Controller | 400W</text>
  <text x="872" y="485" text-anchor="middle" font-size="9" fill="#9e9e9e">16A rated | 20A peak</text>

  <!-- Right Motor -->
  <rect x="810" y="515" width="145" height="48" rx="22" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="882" y="537" text-anchor="middle" font-size="12" font-weight="700" fill="#4a148c">Right BLDC</text>
  <text x="882" y="553" text-anchor="middle" font-size="9" fill="#8e24aa">3-ph + Hall</text>

  <!-- Fuse to controller -->
  <line x1="825" y1="421" x2="825" y2="432" stroke="#d32f2f" stroke-width="1.5" marker-end="url(#arrR)"/>
  <!-- Controller to motor -->
  <line x1="872" y1="497" x2="882" y2="515" stroke="#8e24aa" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- ==================== LOGIC POWER BRANCHES ==================== -->

  <!-- Pi power branch -->
  <line x1="680" y1="250" x2="560" y2="250" stroke="#1565c0" stroke-width="2"/>

  <!-- Pi Fuse -->
  <rect x="470" y="237" width="90" height="32" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="515" y="257" text-anchor="middle" font-size="11" font-weight="700" fill="#1565c0">3A Fuse</text>

  <!-- Pi Buck Converter -->
  <rect x="280" y="225" width="180" height="55" rx="5" fill="#ffffff" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#0d47a1">36V &rarr; 5.1V Buck</text>
  <text x="370" y="264" text-anchor="middle" font-size="10" fill="#1976d2">Dedicated | 5A min</text>
  <text x="370" y="276" text-anchor="middle" font-size="9" fill="#90caf9">Isolated from motor noise</text>

  <!-- Raspberry Pi 5 -->
  <rect x="60" y="222" width="190" height="62" rx="6" fill="#ffffff" stroke="#1565c0" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="60" y="222" width="190" height="22" rx="6" fill="#1565c0"/>
  <rect x="60" y="238" width="190" height="6" fill="#1565c0"/>
  <text x="155" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Raspberry Pi 5</text>
  <text x="155" y="260" text-anchor="middle" font-size="10" fill="#1565c0">5.1V / 3-5A typical</text>
  <text x="155" y="275" text-anchor="middle" font-size="9" fill="#90caf9">+ USB camera + peripherals</text>

  <!-- Fuse to Buck -->
  <line x1="470" y1="253" x2="460" y2="253" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arrB)"/>
  <!-- Buck to Pi -->
  <line x1="280" y1="253" x2="250" y2="253" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arrB)"/>

  <!-- STM32 power branch -->
  <line x1="680" y1="370" x2="560" y2="370" stroke="#2e7d32" stroke-width="2"/>

  <!-- Logic Fuse -->
  <rect x="470" y="357" width="90" height="32" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="515" y="377" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">2A Fuse</text>

  <!-- Logic Buck Converter -->
  <rect x="280" y="345" width="180" height="55" rx="5" fill="#ffffff" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">36V &rarr; 5V Buck</text>
  <text x="370" y="384" text-anchor="middle" font-size="10" fill="#43a047">Logic rail | 2A</text>
  <text x="370" y="396" text-anchor="middle" font-size="9" fill="#a5d6a7">Clean, low-noise</text>

  <!-- Fuse to Buck -->
  <line x1="470" y1="373" x2="460" y2="373" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrG)"/>

  <!-- STM32 -->
  <rect x="60" y="330" width="190" height="55" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="60" y="330" width="190" height="22" rx="6" fill="#2e7d32"/>
  <rect x="60" y="346" width="190" height="6" fill="#2e7d32"/>
  <text x="155" y="346" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">STM32F767ZI</text>
  <text x="155" y="367" text-anchor="middle" font-size="10" fill="#2e7d32">5V / &lt;500mA</text>
  <text x="155" y="380" text-anchor="middle" font-size="9" fill="#a5d6a7">+ FlySky RX + sensors</text>

  <!-- Buck to STM32 -->
  <line x1="280" y1="373" x2="250" y2="373" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrG)"/>

  <!-- Optional 12V branch label -->
  <line x1="680" y1="480" x2="560" y2="480" stroke="#78909c" stroke-width="1.2" stroke-dasharray="6,4"/>
  <rect x="400" y="467" width="160" height="30" rx="4" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="486" text-anchor="middle" font-size="10" fill="#78909c">36V &rarr; 12V (if needed)</text>
  <text x="350" y="486" font-size="9" fill="#bdbdbd">Lights / sensors</text>

  <!-- ==================== GROUND BUS ==================== -->
  <rect x="50" y="430" width="690" height="40" rx="4" fill="#eceff1" stroke="#607d8b" stroke-width="1.5"/>
  <text x="395" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#37474f">GND BUS  |  Star Ground from Battery Negative</text>
  <text x="395" y="463" text-anchor="middle" font-size="9" fill="#78909c">Motor GND returns separate from logic GND returns at common ground point</text>

  <!-- GND connections -->
  <line x1="155" y1="385" x2="155" y2="430" stroke="#607d8b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="155" y1="284" x2="155" y2="310" stroke="#607d8b" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="155" y1="310" x2="100" y2="430" stroke="#607d8b" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ==================== WIRE GAUGE TABLE ==================== -->
  <rect x="50" y="505" width="690" height="120" rx="5" fill="#ffffff" stroke="#cfd8dc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="70" y="525" font-size="12" font-weight="700" fill="#37474f">Wire Gauge Reference</text>

  <!-- Table header -->
  <line x1="60" y1="533" x2="730" y2="533" stroke="#cfd8dc" stroke-width="1"/>
  <text x="70" y="548" font-size="10" font-weight="600" fill="#546e7a">Circuit</text>
  <text x="280" y="548" font-size="10" font-weight="600" fill="#546e7a">Current</text>
  <text x="400" y="548" font-size="10" font-weight="600" fill="#546e7a">Wire</text>
  <text x="530" y="548" font-size="10" font-weight="600" fill="#546e7a">Fuse</text>
  <text x="640" y="548" font-size="10" font-weight="600" fill="#546e7a">Color Code</text>
  <line x1="60" y1="553" x2="730" y2="553" stroke="#eceff1" stroke-width="1"/>

  <!-- Table rows -->
  <text x="70" y="568" font-size="9" fill="#37474f">Battery &rarr; Distribution</text>
  <text x="280" y="568" font-size="9" fill="#37474f">30A peak</text>
  <text x="400" y="568" font-size="9" fill="#37474f">10 AWG</text>
  <text x="530" y="568" font-size="9" fill="#37474f">30A</text>
  <rect x="640" y="560" width="40" height="10" rx="2" fill="#d32f2f"/>
  <text x="685" y="568" font-size="8" fill="#9e9e9e">Red/Black</text>

  <text x="70" y="583" font-size="9" fill="#37474f">Motor controller feed</text>
  <text x="280" y="583" font-size="9" fill="#37474f">20A peak</text>
  <text x="400" y="583" font-size="9" fill="#37474f">12 AWG</text>
  <text x="530" y="583" font-size="9" fill="#37474f">20A</text>
  <rect x="640" y="575" width="40" height="10" rx="2" fill="#ef6c00"/>
  <text x="685" y="583" font-size="8" fill="#9e9e9e">Orange</text>

  <text x="70" y="598" font-size="9" fill="#37474f">Pi 5V rail</text>
  <text x="280" y="598" font-size="9" fill="#37474f">5A</text>
  <text x="400" y="598" font-size="9" fill="#37474f">18 AWG</text>
  <text x="530" y="598" font-size="9" fill="#37474f">3A</text>
  <rect x="640" y="590" width="40" height="10" rx="2" fill="#1565c0"/>
  <text x="685" y="598" font-size="8" fill="#9e9e9e">Blue</text>

  <text x="70" y="613" font-size="9" fill="#37474f">Logic 5V rail</text>
  <text x="280" y="613" font-size="9" fill="#37474f">1A</text>
  <text x="400" y="613" font-size="9" fill="#37474f">22 AWG</text>
  <text x="530" y="613" font-size="9" fill="#37474f">2A</text>
  <rect x="640" y="605" width="40" height="10" rx="2" fill="#2e7d32"/>
  <text x="685" y="613" font-size="8" fill="#9e9e9e">Green</text>
</svg>
