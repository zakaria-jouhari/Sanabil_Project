<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="2.5" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#37474f"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">Vehicle Control Unit - State Machine</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#636e72">STM32F767ZI | Safety-Critical State Transitions</text>

  <!-- ==================== BOOT STATE ==================== -->
  <!-- Start dot -->
  <circle cx="450" cy="90" r="8" fill="#263238"/>

  <!-- Arrow from start to BOOT -->
  <line x1="450" y1="98" x2="450" y2="118" stroke="#37474f" stroke-width="2" marker-end="url(#arr)"/>

  <!-- BOOT -->
  <rect x="370" y="120" width="160" height="55" rx="8" fill="#eceff1" stroke="#546e7a" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="147" text-anchor="middle" font-size="16" font-weight="700" fill="#263238">BOOT</text>
  <text x="450" y="164" text-anchor="middle" font-size="10" fill="#78909c">HAL Init | Self-test</text>

  <!-- BOOT -> DISARMED -->
  <line x1="450" y1="175" x2="450" y2="218" stroke="#37474f" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="460" y="188" width="100" height="16" rx="3" fill="#f5f5f5" stroke="#cfd8dc" stroke-width="0.8"/>
  <text x="510" y="199" text-anchor="middle" font-size="8" fill="#546e7a">init complete</text>

  <!-- ==================== DISARMED STATE ==================== -->
  <rect x="330" y="220" width="240" height="80" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="252" text-anchor="middle" font-size="18" font-weight="700" fill="#0d47a1">DISARMED</text>
  <text x="450" y="270" text-anchor="middle" font-size="10" fill="#1976d2">Motors OFF | STOP active</text>
  <text x="450" y="285" text-anchor="middle" font-size="10" fill="#1976d2">Waiting for ARM command</text>

  <!-- Motor status indicator -->
  <circle cx="350" cy="248" r="8" fill="#ef5350" stroke="#c62828" stroke-width="1.5"/>
  <text x="350" y="268" text-anchor="middle" font-size="7" fill="#c62828">MTR</text>

  <!-- DISARMED -> ARMED_MANUAL -->
  <line x1="450" y1="300" x2="450" y2="368" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="460" y="316" width="175" height="34" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="0.8"/>
  <text x="547" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">arm_switch = ON</text>
  <text x="547" y="343" text-anchor="middle" font-size="8" fill="#43a047">+ rc_valid + no_faults</text>

  <!-- ==================== ARMED_MANUAL STATE ==================== -->
  <rect x="300" y="370" width="300" height="85" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="450" y="400" text-anchor="middle" font-size="18" font-weight="700" fill="#1b5e20">ARMED_MANUAL</text>
  <text x="450" y="418" text-anchor="middle" font-size="10" fill="#2e7d32">RC controls motors</text>
  <text x="450" y="434" text-anchor="middle" font-size="10" fill="#43a047">FlySky throttle + steering &rarr; mixer</text>
  <text x="450" y="448" text-anchor="middle" font-size="9" fill="#66bb6a">Acceleration limited | Dir-change protected</text>

  <!-- Motor status indicator -->
  <circle cx="320" cy="396" r="8" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="320" y="416" text-anchor="middle" font-size="7" fill="#2e7d32">MTR</text>

  <!-- ARMED_MANUAL -> DISARMED (disarm) -->
  <path d="M 300,400 C 230,400 230,270 330,270" fill="none" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="195" y="320" width="100" height="30" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="0.8"/>
  <text x="245" y="335" text-anchor="middle" font-size="9" font-weight="600" fill="#1565c0">arm OFF</text>
  <text x="245" y="346" text-anchor="middle" font-size="8" fill="#42a5f5">or rc_lost</text>

  <!-- ARMED_MANUAL -> ARMED_AUTO -->
  <line x1="450" y1="455" x2="450" y2="518" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="460" y="470" width="175" height="34" rx="4" fill="#e8f5e9" stroke="#66bb6a" stroke-width="0.8"/>
  <text x="547" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#2e7d32">mode_switch = AUTO</text>
  <text x="547" y="497" text-anchor="middle" font-size="8" fill="#43a047">+ pi_heartbeat valid</text>

  <!-- ==================== ARMED_AUTO STATE ==================== -->
  <rect x="300" y="520" width="300" height="85" rx="10" fill="#f1f8e9" stroke="#7cb342" stroke-width="2.5" filter="url(#shadow)" stroke-dasharray="8,3"/>
  <text x="450" y="550" text-anchor="middle" font-size="18" font-weight="700" fill="#33691e">ARMED_AUTO</text>
  <text x="450" y="568" text-anchor="middle" font-size="10" fill="#558b2f">Pi cmd_vel controls motors</text>
  <text x="450" y="584" text-anchor="middle" font-size="10" fill="#7cb342">RC override always available</text>
  <text x="450" y="598" text-anchor="middle" font-size="9" fill="#9ccc65">V2+ feature</text>

  <!-- Motor status indicator -->
  <circle cx="320" cy="546" r="8" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="320" y="566" text-anchor="middle" font-size="7" fill="#2e7d32">MTR</text>

  <!-- ARMED_AUTO -> ARMED_MANUAL (fallback) -->
  <path d="M 300,560 C 220,560 220,430 300,430" fill="none" stroke="#ff8f00" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="160" y="485" width="118" height="30" rx="4" fill="#fff8e1" stroke="#ffca28" stroke-width="0.8"/>
  <text x="219" y="499" text-anchor="middle" font-size="9" font-weight="600" fill="#f57f17">mode = MANUAL</text>
  <text x="219" y="510" text-anchor="middle" font-size="8" fill="#ffa000">or pi_timeout(250ms)</text>

  <!-- ==================== FAULT STATE ==================== -->
  <rect x="660" y="350" width="200" height="100" rx="10" fill="#ffebee" stroke="#c62828" stroke-width="3" filter="url(#shadow)"/>
  <text x="760" y="385" text-anchor="middle" font-size="20" font-weight="800" fill="#b71c1c">FAULT</text>
  <text x="760" y="405" text-anchor="middle" font-size="10" fill="#c62828">Motors OFF | STOP active</text>
  <text x="760" y="420" text-anchor="middle" font-size="10" fill="#e53935">Requires manual reset</text>
  <text x="760" y="436" text-anchor="middle" font-size="9" fill="#ef9a9a">(disarm &rarr; clear faults &rarr; arm)</text>

  <!-- Motor status indicator -->
  <circle cx="678" cy="381" r="8" fill="#ef5350" stroke="#c62828" stroke-width="1.5"/>
  <text x="678" y="401" text-anchor="middle" font-size="7" fill="#c62828">MTR</text>

  <!-- ARMED_MANUAL -> FAULT -->
  <line x1="600" y1="410" x2="660" y2="400" stroke="#c62828" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- ARMED_AUTO -> FAULT -->
  <line x1="600" y1="560" x2="730" y2="450" stroke="#c62828" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- DISARMED -> FAULT -->
  <line x1="570" y1="260" x2="690" y2="355" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>

  <!-- Fault conditions label -->
  <rect x="630" y="280" width="180" height="50" rx="4" fill="#ffcdd2" stroke="#e57373" stroke-width="1"/>
  <text x="720" y="298" text-anchor="middle" font-size="9" font-weight="700" fill="#b71c1c">Critical Fault Triggers:</text>
  <text x="720" y="312" text-anchor="middle" font-size="9" fill="#c62828">E-STOP | Battery critical</text>
  <text x="720" y="324" text-anchor="middle" font-size="8" fill="#e53935">(&lt;30V)</text>

  <!-- FAULT -> DISARMED (reset) -->
  <path d="M 760,350 C 760,270 620,230 570,240" fill="none" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <rect x="650" y="248" width="130" height="26" rx="4" fill="#eceff1" stroke="#90a4ae" stroke-width="0.8"/>
  <text x="715" y="264" text-anchor="middle" font-size="8" fill="#546e7a">faults cleared + arm OFF</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="40" y="628" width="820" height="40" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>

  <circle cx="70" cy="648" r="7" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="85" y="652" font-size="10" fill="#37474f">Motors ON</text>

  <circle cx="170" cy="648" r="7" fill="#ef5350" stroke="#c62828" stroke-width="1.5"/>
  <text x="185" y="652" font-size="10" fill="#37474f">Motors OFF</text>

  <line x1="270" y1="648" x2="300" y2="648" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="310" y="652" font-size="10" fill="#37474f">Arm/enable</text>

  <line x1="400" y1="648" x2="430" y2="648" stroke="#c62828" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="440" y="652" font-size="10" fill="#37474f">Fault</text>

  <line x1="490" y1="648" x2="520" y2="648" stroke="#1565c0" stroke-width="1.8"/>
  <text x="530" y="652" font-size="10" fill="#37474f">Disarm</text>

  <line x1="590" y1="648" x2="620" y2="648" stroke="#ff8f00" stroke-width="1.8"/>
  <text x="630" y="652" font-size="10" fill="#37474f">Fallback</text>

  <rect x="700" y="640" width="30" height="14" rx="3" fill="none" stroke="#7cb342" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="740" y="652" font-size="10" fill="#37474f">V2+ state</text>

  <text x="820" y="652" font-size="10" fill="#9e9e9e">AgriBot</text>
</svg>
